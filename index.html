<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Лесенка — Групповая спортивная игра</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --accent: #00d4aa;
      --danger: #ff4757;
      --gold: #ffd700;
      --text: #e0e0e0;
      --muted: #888;
      --border: #2a2a40;
      --rest: #f39c12;
      --bronze: #cd7f32;
      --silver: #c0c0c0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 12px;
    }
    .phone {
      width: 100%;
      max-width: 400px;
      background: var(--bg);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 18px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .trophy { font-size: 28px; margin-bottom: 4px; }
    .game-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: 1px;
    }
    .game-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }
    .round-badge {
      display: inline-block;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 18px;
      font-size: 13px;
      margin: 10px 0 3px;
    }
    .total-time {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }
    .total-time span {
      color: var(--gold);
      font-weight: 700;
      font-size: 13px;
    }

    .players { padding: 10px 14px; }
    .player-row {
      display: flex;
      align-items: center;
      padding: 9px 11px;
      margin-bottom: 5px;
      background: var(--card);
      border-radius: 12px;
      border: 2px solid transparent;
      transition: all 0.3s ease;
    }
    .player-row.active {
      border-color: var(--accent);
      background: linear-gradient(90deg, #1a1a2e 0%, #0d3328 100%);
      box-shadow: 0 0 15px rgba(0,212,170,0.12);
    }
    .player-row.eliminated {
      opacity: 0.35;
      background: #1a0a0a;
    }
    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      margin-right: 9px;
      flex-shrink: 0;
    }
    .player-info { flex: 1; min-width: 0; }
    .player-name {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-status {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
    }
    .reps {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      min-width: 55px;
      text-align: right;
      white-space: nowrap;
    }
    .reps.done { color: var(--accent); }
    .reps.elim { color: var(--danger); font-size: 11px; }
    .arrow { margin: 0 5px; font-size: 14px; color: var(--accent); opacity: 0; }
    .player-row.active .arrow { opacity: 1; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .timer-section {
      text-align: center;
      padding: 12px;
      background: linear-gradient(180deg, transparent 0%, rgba(0,212,170,0.05) 100%);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .timer-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 3px;
    }
    .timer {
      font-size: 38px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      text-shadow: 0 0 25px rgba(0,212,170,0.25);
      letter-spacing: 2px;
    }
    .current-player-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      margin-top: 5px;
    }
    .current-player-name .label {
      color: var(--muted);
      font-weight: 400;
      font-size: 11px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 14px;
    }
    .btn {
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      touch-action: manipulation;
    }
    .btn-done {
      background: linear-gradient(135deg, #00d4aa 0%, #00b894 100%);
      color: #000;
      box-shadow: 0 3px 15px rgba(0,212,170,0.25);
    }
    .btn-done:active { transform: scale(0.95); }
    .btn-giveup {
      background: transparent;
      color: var(--danger);
      border: 2px solid var(--danger);
    }
    .btn-giveup:active { background: rgba(255,71,87,0.1); }

    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 8px 14px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
    }
    .stat { text-align: center; }
    .stat-value {
      font-size: 16px;
      font-weight: 800;
      color: var(--gold);
    }
    .stat-label {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .chat {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      max-height: 120px;
      overflow-y: auto;
    }
    .chat-title {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .msg {
      font-size: 11px;
      padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .msg-name { color: var(--accent); font-weight: 600; }
    .msg-time { color: var(--muted); font-size: 9px; margin-left: 4px; }

    .pass-hint {
      text-align: center;
      padding: 7px 14px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(0,0,0,0.2);
    }
    .pass-hint strong { color: var(--gold); }

    /* ===== RESULTS SCREEN ===== */
    .results-screen { padding: 0; overflow-y: visible; }
    .results-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 20px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .results-header .trophy { font-size: 36px; margin-bottom: 5px; }
    .results-header .game-title { font-size: 20px; }
    .results-header .game-sub { margin-top: 5px; }
    .results-summary {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }
    .results-summary-item { text-align: center; }
    .results-summary-item .val {
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
    }
    .results-summary-item .lbl {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .results-list { padding: 10px 14px; }
    .result-card {
      background: var(--card);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .result-card.winner {
      border-color: var(--gold);
      background: linear-gradient(135deg, #1a1a2e 0%, #2a1f00 100%);
    }
    .result-card.winner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), #ffaa00);
    }
    .result-rank {
      position: absolute;
      top: 8px;
      right: 12px;
      font-size: 24px;
      font-weight: 800;
      opacity: 0.12;
    }
    .result-card.winner .result-rank { opacity: 0.25; color: var(--gold); }
    .result-top {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 8px;
    }
    .result-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .result-avatar.gold { background: linear-gradient(135deg, #ffd700, #ffaa00); }
    .result-avatar.silver { background: linear-gradient(135deg, #c0c0c0, #888); }
    .result-avatar.bronze { background: linear-gradient(135deg, #cd7f32, #8b4513); }
    .result-name { font-size: 15px; font-weight: 700; }
    .result-name .winner-tag {
      background: var(--gold);
      color: #000;
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 8px;
      margin-left: 5px;
      font-weight: 800;
    }
    .result-status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .result-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .result-stat-box {
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      padding: 7px;
      text-align: center;
    }
    .result-stat-box .rs-val {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
    }
    .result-stat-box .rs-val.gold { color: var(--gold); }
    .result-stat-box .rs-val.accent { color: var(--accent); }
    .result-stat-box .rs-val.danger { color: var(--danger); }
    .result-stat-box .rs-lbl {
      font-size: 8px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }
    .result-rounds-detail {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 10px;
      color: var(--muted);
      line-height: 1.5;
    }
    .result-rounds-detail span.round-done { color: var(--accent); font-weight: 600; }
    .result-rounds-detail span.round-fail { color: var(--danger); font-weight: 600; }

    .results-actions {
      padding: 10px 14px 16px;
      display: flex;
      gap: 8px;
    }
    .results-actions .btn { flex: 1; }
    .btn-share {
      background: linear-gradient(135deg, #0088cc, #0055aa);
      color: #fff;
      box-shadow: 0 3px 15px rgba(0,136,204,0.25);
    }

    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      justify-content: center;
      align-items: flex-start;
      z-index: 100;
      backdrop-filter: blur(10px);
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    .overlay.show { display: flex; }
    .modal {
      background: var(--bg);
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
      animation: pop 0.3s ease;
      overflow: visible;
      margin: auto;
    }
    @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    .setup { padding: 16px; }
    .setup h2 { text-align: center; margin-bottom: 16px; font-size: 16px; }
    .input-group { margin-bottom: 12px; }
    .input-group label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .players-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
    }
    .chip {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 4px 9px;
      border-radius: 14px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .chip .remove { cursor: pointer; color: var(--danger); font-weight: 700; font-size: 13px; }
    .start-btn { width: 100%; margin-top: 8px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="phone">
  <!-- Экран настройки -->
  <div id="setupScreen" class="setup">
    <div class="header" style="margin:-16px -16px 16px -16px;">
      <div class="trophy">🏋️</div>
      <div class="game-title">ЛЕСЕНКА</div>
      <div class="game-sub">Групповая спортивная игра — на одном телефоне</div>
    </div>
    <div class="input-group">
      <label>Упражнение</label>
      <select id="exercise">
        <option>Приседания</option>
        <option>Отжимания</option>
        <option>Подтягивания</option>
        <option>Берпи</option>
        <option>Планка (сек)</option>
      </select>
    </div>
    <div class="input-group">
      <label>Игроки (введите всех)</label>
      <input type="text" id="playerInput" placeholder="Введите имя и Enter" onkeydown="if(event.key==='Enter')addPlayer()">
      <div class="players-list" id="playersList"></div>
    </div>
    <button class="btn btn-done start-btn" onclick="startGame()">🚀 Начать игру</button>
  </div>

  <!-- Экран игры -->
  <div id="gameScreen" class="hidden">
    <div class="header">
      <div class="trophy">🏆</div>
      <div class="game-title" id="gameTitle">ЛЕСЕНКА #247</div>
      <div class="game-sub" id="gameSub">Приседания | 5 игроков</div>
      <div class="round-badge" id="roundBadge">Раунд 1</div>
      <div class="total-time">⏱ Общее время: <span id="totalTime">00:00</span></div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="statReps">1</div>
        <div class="stat-label">Повторений</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statActive">5</div>
        <div class="stat-label">В игре</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="statEliminated">0</div>
        <div class="stat-label">Выбыло</div>
      </div>
    </div>

    <div class="players" id="playersContainer"></div>

    <div class="pass-hint" id="passHint">
      📱 <strong>Передай телефон</strong> игроку, чей ход
    </div>

    <div class="timer-section">
      <div class="timer-label">ОБЩЕЕ ВРЕМЯ ИГРЫ</div>
      <div class="timer" id="timer">00:00</div>
      <div class="current-player-name" id="currentPlayerName">
        <span class="label">Сейчас ходит:</span> —
      </div>
    </div>

    <div class="actions" id="actionButtons">
      <button class="btn btn-done" onclick="completeTurn()">✅ ГОТОВО</button>
      <button class="btn btn-giveup" onclick="giveUp()">❌ СДАЮСЬ</button>
    </div>

    <div class="chat" id="chatBox">
      <div class="chat-title">💬 События</div>
      <div id="chatMessages"></div>
    </div>
  </div>
</div>

<!-- Модальное окно с результатами -->
<div class="overlay" id="modal">
  <div class="modal results-screen" id="resultsContent"></div>
</div>

<script>
  // Telegram WebApp init
  let tg;
  try {
    tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0f0f1a');
    tg.setBackgroundColor('#0f0f1a');
  } catch(e) { console.log('Telegram WebApp not available'); }

  let players = [];
  let currentRound = 1;
  let currentPlayerIndex = 0;
  let gameTimerInterval;
  let gameSeconds = 0;
  let exercise = 'Приседания';
  let gameId = Math.floor(Math.random() * 900) + 100;
  let gameHistory = [];

  const defaultNames = ['Ты', 'Сергей', 'Анна', 'Дима', 'Катя'];

  function addPlayer() {
    const input = document.getElementById('playerInput');
    const name = input.value.trim();
    if (!name) return;
    if (players.includes(name)) { input.value = ''; return; }
    players.push(name);
    renderPlayersList();
    input.value = '';
  }

  function removePlayer(name) {
    players = players.filter(p => p !== name);
    renderPlayersList();
  }

  function renderPlayersList() {
    const list = document.getElementById('playersList');
    list.innerHTML = players.map(p => 
      `<div class="chip">${p} <span class="remove" onclick="removePlayer('${p}')">×</span></div>`
    ).join('');
  }

  defaultNames.forEach(n => { if (!players.includes(n)) players.push(n); });
  renderPlayersList();

  function startGame() {
    if (players.length < 2) {
      alert('Нужно минимум 2 игрока!');
      return;
    }
    exercise = document.getElementById('exercise').value;
    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');
    document.getElementById('gameTitle').textContent = `ЛЕСЕНКА #${gameId}`;
    document.getElementById('gameSub').textContent = `${exercise} | ${players.length} игроков`;

    players = players.map((name, i) => ({
      name,
      reps: 0,
      active: true,
      done: false,
      totalReps: 0,
      outRound: null,
      roundsCompleted: []
    }));

    currentRound = 1;
    currentPlayerIndex = 0;
    gameSeconds = 0;
    gameHistory = [];

    startGameTimer();
    startRound();
    addChat('🎮', `Игра #${gameId} началась! ${exercise}, ${players.length} игроков.`);
  }

  function startGameTimer() {
    clearInterval(gameTimerInterval);
    gameTimerInterval = setInterval(() => {
      gameSeconds++;
      updateTotalTimer();
    }, 1000);
  }

  function updateTotalTimer() {
    const m = Math.floor(gameSeconds / 60).toString().padStart(2, '0');
    const s = (gameSeconds % 60).toString().padStart(2, '0');
    const timeStr = `${m}:${s}`;
    document.getElementById('timer').textContent = timeStr;
    document.getElementById('totalTime').textContent = timeStr;
  }

  function startRound() {
    players.forEach(p => { if (p.active) p.done = false; });
    currentPlayerIndex = 0;
    document.getElementById('statReps').textContent = currentRound;
    addChat('📢', `Раунд ${currentRound}! Каждый делает ${currentRound} ${getRepsWord(currentRound)}.`);
    nextTurn();
  }

  function getRepsWord(n) {
    const last = n % 10;
    const lastTwo = n % 100;
    if (lastTwo >= 11 && lastTwo <= 14) return 'повторений';
    if (last === 1) return 'повторение';
    if (last >= 2 && last <= 4) return 'повторения';
    return 'повторений';
  }

  function nextTurn() {
    while (currentPlayerIndex < players.length) {
      if (players[currentPlayerIndex].active && !players[currentPlayerIndex].done) {
        renderPlayers();
        return;
      }
      currentPlayerIndex++;
    }
    currentRound++;
    addChat('🏁', `Раунд ${currentRound - 1} завершён за ${formatTime(gameSeconds)}!`);
    startRound();
  }

  function renderPlayers() {
    const container = document.getElementById('playersContainer');
    document.getElementById('roundBadge').textContent = `Раунд ${currentRound}`;

    const activeCount = players.filter(p => p.active).length;
    const elimCount = players.filter(p => !p.active).length;
    document.getElementById('statActive').textContent = activeCount;
    document.getElementById('statEliminated').textContent = elimCount;

    const current = players[currentPlayerIndex];
    document.getElementById('currentPlayerName').innerHTML = 
      `<span class="label">Сейчас ходит:</span> ${current ? current.name : '—'}`;

    container.innerHTML = players.map((p, i) => {
      const isActive = i === currentPlayerIndex && p.active && !p.done;
      const repsText = p.active 
        ? (p.done ? `${currentRound} ${getRepsWord(currentRound)}` : (isActive ? `${currentRound} ${getRepsWord(currentRound)} ⏱` : '...'))
        : `выбыл (раунд ${p.outRound})`;
      const repsClass = p.done ? 'done' : (p.active ? '' : 'elim');
      const arrow = isActive ? '→' : (p.done ? '✓' : '');

      return `
        <div class="player-row ${isActive ? 'active' : ''} ${!p.active ? 'eliminated' : ''}">
          <div class="avatar">👤</div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="player-status">${p.active ? (isActive ? 'Твой ход! Делай упражнение' : (p.done ? 'Выполнено' : 'Ожидает...')) : 'Выбыл'} ${p.totalReps > 0 ? `· Всего: ${p.totalReps}` : ''}</div>
          </div>
          <div class="arrow">${arrow}</div>
          <div class="reps ${repsClass}">${repsText}</div>
        </div>
      `;
    }).join('');
  }

  function completeTurn() {
    const p = players[currentPlayerIndex];
    if (!p || !p.active || p.done) return;

    p.reps = currentRound;
    p.totalReps += currentRound;
    p.done = true;
    p.roundsCompleted.push(currentRound);

    gameHistory.push({
      player: p.name,
      round: currentRound,
      reps: currentRound,
      time: gameSeconds,
      action: 'done'
    });

    addChat(p.name, `Сделал ${currentRound} ${getRepsWord(currentRound)}! (всего ${p.totalReps}) 💪`);

    currentPlayerIndex++;

    const activePlayers = players.filter(pl => pl.active);
    if (activePlayers.length === 1) {
      endGame(activePlayers[0]);
      return;
    }

    setTimeout(nextTurn, 400);
  }

  function giveUp() {
    const p = players[currentPlayerIndex];
    if (!p || !p.active) return;

    p.active = false;
    p.outRound = currentRound;

    gameHistory.push({
      player: p.name,
      round: currentRound,
      reps: 0,
      time: gameSeconds,
      action: 'giveup'
    });

    addChat(p.name, `Сдался на ${currentRound} раунде! Всего сделал: ${p.totalReps} 😵`);

    currentPlayerIndex++;

    const activePlayers = players.filter(pl => pl.active);
    if (activePlayers.length === 1) {
      endGame(activePlayers[0]);
      return;
    }
    if (activePlayers.length === 0) {
      endGame(null);
      return;
    }

    setTimeout(nextTurn, 400);
  }

  function endGame(winner) {
    clearInterval(gameTimerInterval);

    const totalTime = formatTime(gameSeconds);
    const totalRepsAll = players.reduce((sum, p) => sum + p.totalReps, 0);

    const sortedPlayers = [...players].sort((a, b) => {
      if (a.active && !b.active) return -1;
      if (!a.active && b.active) return 1;
      return b.totalReps - a.totalReps;
    });

    const medals = ['🥇', '🥈', '🥉'];
    const avatarClasses = ['gold', 'silver', 'bronze'];

    let resultsHTML = `
      <div class="results-header">
        <div class="trophy">🏆</div>
        <div class="game-title">ИТОГИ ИГРЫ</div>
        <div class="game-sub">ЛЕСЕНКА #${gameId} · ${exercise}</div>
        <div class="results-summary">
          <div class="results-summary-item">
            <div class="val">${totalTime}</div>
            <div class="lbl">Время</div>
          </div>
          <div class="results-summary-item">
            <div class="val">${currentRound}</div>
            <div class="lbl">Раундов</div>
          </div>
          <div class="results-summary-item">
            <div class="val">${totalRepsAll}</div>
            <div class="lbl">Всего reps</div>
          </div>
        </div>
      </div>
      <div class="results-list">
    `;

    sortedPlayers.forEach((p, idx) => {
      const isWinner = p.active;
      const rank = idx + 1;
      const medal = idx < 3 ? medals[idx] : '';
      const avatarClass = idx < 3 ? avatarClasses[idx] : '';
      const statusText = isWinner 
        ? `🏆 Победитель! Выдержал все ${currentRound} раундов`
        : `😵 Выбыл на ${p.outRound} раунде`;

      let roundsDetail = '';
      if (p.roundsCompleted.length > 0) {
        const roundsStr = p.roundsCompleted.map(r => `<span class="round-done">${r}</span>`).join(', ');
        roundsDetail = `<div class="result-rounds-detail">✅ Пройдены раунды: ${roundsStr}</div>`;
      }

      resultsHTML += `
        <div class="result-card ${isWinner ? 'winner' : ''}">
          <div class="result-rank">#${rank}</div>
          <div class="result-top">
            <div class="result-avatar ${avatarClass}">${medal || '👤'}</div>
            <div>
              <div class="result-name">${p.name} ${isWinner ? '<span class="winner-tag">ПОБЕДИТЕЛЬ</span>' : ''}</div>
              <div class="result-status">${statusText}</div>
            </div>
          </div>
          <div class="result-stats-grid">
            <div class="result-stat-box">
              <div class="rs-val gold">${p.totalReps}</div>
              <div class="rs-lbl">Всего reps</div>
            </div>
            <div class="result-stat-box">
              <div class="rs-val accent">${p.roundsCompleted.length}</div>
              <div class="rs-lbl">Раундов пройдено</div>
            </div>
            <div class="result-stat-box">
              <div class="rs-val danger">${p.outRound || currentRound}</div>
              <div class="rs-lbl">Высший раунд</div>
            </div>
          </div>
          ${roundsDetail}
        </div>
      `;
    });

    resultsHTML += `
      </div>
      <div class="results-actions">
        <button class="btn btn-done" onclick="resetGame()">🔄 Новая игра</button>
        <button class="btn btn-share" onclick="shareResults()">📤 Поделиться</button>
      </div>
    `;

    document.getElementById('resultsContent').innerHTML = resultsHTML;
    document.getElementById('modal').classList.add('show');

    // Разрешаем скролл в overlay на мобильных
    const overlay = document.getElementById('modal');
    overlay.addEventListener('touchmove', function(e) {
      e.stopPropagation();
    }, { passive: true });

    if (tg) {
      tg.HapticFeedback.notificationOccurred('success');
    }
  }

  function shareResults() {
    const totalTime = formatTime(gameSeconds);
    const totalRepsAll = players.reduce((sum, p) => sum + p.totalReps, 0);

    let text = `🏆 ЛЕСЕНКА #${gameId}\n`;
    text += `${exercise} · ${players.length} игроков\n`;
    text += `⏱ ${totalTime} · 📊 ${currentRound} раундов\n\n`;

    const sorted = [...players].sort((a, b) => b.totalReps - a.totalReps);
    sorted.forEach((p, i) => {
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '👤';
      text += `${medal} ${p.name}: ${p.totalReps} reps`;
      if (p.active) text += ' 👑';
      else text += ` (раунд ${p.outRound})`;
      text += '\n';
    });

    if (tg) {
      tg.sendData(JSON.stringify({ action: 'share', text }));
    } else if (navigator.share) {
      navigator.share({ title: 'Лесенка — результаты', text });
    } else {
      navigator.clipboard.writeText(text).then(() => alert('Результаты скопированы!'));
    }
  }

  function formatTime(sec) {
    const m = Math.floor(sec / 60).toString().padStart(2, '0');
    const s = (sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  function resetGame() {
    document.getElementById('modal').classList.remove('show');
    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('setupScreen').classList.remove('hidden');
    players = [];
    defaultNames.forEach(n => { if (!players.includes(n)) players.push(n); });
    renderPlayersList();
    gameId = Math.floor(Math.random() * 900) + 100;
    document.getElementById('timer').textContent = '00:00';
  }

  function addChat(name, text) {
    const box = document.getElementById('chatMessages');
    const time = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
    const div = document.createElement('div');
    div.className = 'msg';
    div.innerHTML = `<span class="msg-name">${name}</span> ${text} <span class="msg-time">${time}</span>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
</script>

</body>
